- name: Brendan Lucier
  affiliation: Microsoft Research New England
  initials: BL
  image: /assets/images/speakers/brendan-lucier.jpg
  talk_title: "Agentic Markets and Consumer Search"
  abstract: "Consumers increasingly delegate the discovery and evaluation of products to AI agents that search on their behalf. This change is poised to impact the way firms attract customers, the way platforms monetize and make recommendations, and the information revealed to the market through the search process. In this talk I’ll discuss market design implications and research challenges stemming from agent-powered consumer search."

