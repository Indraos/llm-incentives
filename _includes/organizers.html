<section id="organizers" class="section section-warm">
  <div class="container">
    <h2>Organizers</h2>
    <div class="card-grid card-grid-3">
      {% for org in site.data.organizers %}
      <div class="card organizer-card">
        <div class="avatar">
          {% if org.image %}
            <img src="{{ org.image | relative_url }}" alt="Portrait of {{ org.name }}">
          {% else %}
            <span>{{ org.initials }}</span>
          {% endif %}
        </div>
        <h3>{{ org.name }}</h3>
        <p class="affiliation">{{ org.affiliation }}</p>
        {% if org.bio %}<p class="bio">{{ org.bio }}</p>{% endif %}
      </div>
      {% endfor %}
    </div>
  </div>
</section>
