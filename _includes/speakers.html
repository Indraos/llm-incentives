<section id="speakers" class="section">
  <div class="container">
    <h2>Invited Speakers</h2>
    <div class="card-grid card-grid-3">
      {% for speaker in site.data.speakers %}
      <div class="card speaker-card">
        <div class="avatar">
          {% if speaker.image %}
            <img src="{{ speaker.image | relative_url }}" alt="Portrait of {{ speaker.name }}">
          {% else %}
            <span>{{ speaker.initials }}</span>
          {% endif %}
        </div>
        <h3>{{ speaker.name }}</h3>
        <p class="affiliation">{{ speaker.affiliation }}</p>
        {% if speaker.bio %}<p class="bio">{{ speaker.bio }}</p>{% endif %}
      </div>
      {% endfor %}
    </div>
  </div>
</section>
